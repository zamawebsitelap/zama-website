# --- SEO: browser tab title + Google/social description ---
seo:
  title: "ZAMA | Boutique Digital Marketing Agency in Washington, DC"
  description: "ZAMA is a boutique digital marketing agency serving Washington, DC and South Florida, helping brands grow through strategy, creative, paid media, social, email, and SEO."

# --- Hero (the opening screen) ---
hero:
  h1: "Every brand deserves its dawn, its sunrise, its light."
  subhead: "Every brand has a moment before the world sees it. A quiet, still dark, full of everything it could become. ZAMA exists for that moment — from first light to full warmth, we help brands rise."
  primaryCta:
    label: "Start a project"
    href: "/contact"
  secondaryCta:
    label: "See our work"
    href: "/work"
  # Swap this image in /public/images/ to change the hero visual.
  # To use your own photo: add it to /public/images/ (e.g. hero-portrait.jpg)
  # and point this line at it. Always update the alt text below too.
  image: "/images/savoir00001.jpg"
  imageAlt: "A real hero photo for ZAMA, a boutique digital marketing agency in Washington, DC."

# --- Positioning statement ---
positioning: "A boutique agency that takes brands from unseen to unmistakable, from the first light of an idea to the full warmth of being known. We bring strategy, creative, and growth together with senior attention and care."

